services:
  mailserver:
    # Use the published image, or replace with `build: .` to build locally.
    image: ghcr.io/rroblf01/postman-rabbit:latest
    container_name: postman-rabbit
    hostname: mail.example.com
    restart: unless-stopped
    ports:
      - "25:25"     # SMTP (receive mail from other servers)
      - "587:587"   # Submission (clients send mail, STARTTLS)
      - "465:465"   # SMTPS (clients send mail, implicit TLS)
      - "143:143"   # IMAP (read mail, STARTTLS)
      - "993:993"   # IMAPS (read mail, implicit TLS)
    volumes:
      - maildata:/var/mail
      - ./certs:/etc/mailserver/certs:ro
      - ./dkim:/etc/mailserver/dkim:ro
    environment:
      HOSTNAME: mail.example.com
      DOMAIN: example.com
      USERS: "alice:change-me,bob:change-me-too"
      TLS_CERT: /etc/mailserver/certs/fullchain.pem
      TLS_KEY: /etc/mailserver/certs/privkey.pem
      DKIM_SELECTOR: default
      DKIM_KEY_FILE: /etc/mailserver/dkim/default.pem

volumes:
  maildata:
